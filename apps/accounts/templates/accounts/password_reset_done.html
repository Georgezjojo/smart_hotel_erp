{% extends 'base_public.html' %}
{% block title %}Reset Email Sent{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-orange-50 to-orange-100">
    <div class="glass-card w-full max-w-md p-8 text-center space-y-4">
        <div class="bg-primary w-16 h-16 mx-auto rounded-2xl flex items-center justify-center text-white text-3xl font-bold shadow-lg">GH</div>
        <h2 class="text-2xl font-bold text-slate-800">Check Your Email</h2>
        <p class="text-slate-500">We've sent you a password reset link. Please check your inbox.</p>
        <a href="{% url 'login' %}" class="inline-block text-primary hover:underline text-sm font-medium">Return to Login</a>
    </div>
</div>
{% endblock %}
