{% extends 'base_public.html' %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-orange-50 to-orange-100">
    <div class="glass-card w-full max-w-md p-8 space-y-6">
        <div class="text-center">
            <div class="bg-primary w-16 h-16 mx-auto rounded-2xl flex items-center justify-center text-white text-3xl font-bold shadow-lg">GH</div>
            <h2 class="mt-4 text-2xl font-bold text-slate-800">Set New Password</h2>
        </div>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">New Password</label>
                <input type="password" name="new_password1" id="newPassword1" required class="w-full border border-slate-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none">
                <div class="mt-1">
                    <div id="strengthMeterReset"></div>
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Confirm Password</label>
                <input type="password" name="new_password2" required class="w-full border border-slate-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none">
            </div>
            <button type="submit" class="w-full bg-primary hover:bg-primaryDark text-white font-semibold py-2.5 rounded-lg transition shadow-md">Reset Password</button>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
    // Initialize strength meter for reset password
    document.addEventListener('DOMContentLoaded', function() {
        updateStrengthMeter('newPassword1', 'strengthMeterReset');
    });
</script>
{% endblock %}
