{% extends 'base.html' %}
{% block title %}Waiter POS{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-4">Waiter Order Entry</h2>
<form class="glass-card p-4 space-y-4">
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="text-xs font-semibold">Table Number</label>
            <select class="w-full border rounded px-3 py-2 text-sm">
                {% for table in tables %}<option value="{{ table.id }}">{{ table.number }}</option>{% endfor %}
            </select>
        </div>
        <div>
            <label class="text-xs font-semibold">Menu Item</label>
            <select class="w-full border rounded px-3 py-2 text-sm">
                {% for item in items %}<option value="{{ item.id }}">{{ item.name }} – ₹{{ item.price }}</option>{% endfor %}
            </select>
        </div>
    </div>
    <button type="submit" class="bg-primary text-white px-4 py-2 rounded text-sm">Place Order</button>
</form>
{% endblock %}
