{% extends 'base.html' %}
{% block title %}Guest Check-Out{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto glass-card p-6">
    <h2 class="text-2xl font-bold mb-4">Guest Check-Out</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-semibold uppercase mb-1">Reservation ID</label>
            <input type="text" name="reservation_id" required class="w-full border border-slate-200 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition">
        </div>
        <button type="submit" class="w-full bg-primary hover:bg-primaryDark text-white font-semibold py-2.5 rounded-lg transition shadow-md">
            <i class="fa-solid fa-right-from-bracket mr-2"></i> Process Check-Out
        </button>
    </form>
</div>
{% endblock %}
