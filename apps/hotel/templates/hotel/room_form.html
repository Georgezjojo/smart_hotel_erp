{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto glass-card p-6">
    <h2 class="text-2xl font-bold mb-6">{{ title }}</h2>
    <form method="post" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="bg-primary hover:bg-primaryDark text-white px-6 py-2 rounded-lg transition">Save Room</button>
    </form>
</div>
{% endblock %}
