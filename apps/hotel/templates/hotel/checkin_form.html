{% extends 'base.html' %}
{% block title %}Guest Check‑in{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto glass-card p-6">
    <div class="flex items-center justify-between border-b border-slate-100 pb-4 mb-6">
        <div>
            <h2 class="text-lg font-bold text-slate-800">New Guest Intake Dossier</h2>
            <p class="text-xs text-slate-400 mt-0.5">Verify and record government‑issued documentation</p>
        </div>
        <span class="bg-blue-50 text-blue-700 text-xs font-semibold px-2.5 py-1 rounded-md">Status: Pending Verification</span>
    </div>
    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Full Legal Name</label>
                <input type="text" name="full_name" placeholder="e.g. Jaroslav Brabec" required class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Email Address</label>
                <input type="email" name="email" placeholder="name@domain.com" required class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Phone String</label>
                <input type="text" name="phone" placeholder="+49 (0) 000-0000" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition">
            </div>
        </div>
        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Passport / National ID Number</label>
                <input type="text" name="passport_number" placeholder="KC01123MK" class="w-full text-sm bg-white border border-slate-200 rounded-lg px-3 py-2 outline-none">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Country of Issuance</label>
                <input type="text" name="country" placeholder="Germany" class="w-full text-sm bg-white border border-slate-200 rounded-lg px-3 py-2 outline-none">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Document Expiration Date</label>
                <input type="date" name="passport_expiry" class="w-full text-sm bg-white border border-slate-200 rounded-lg px-3 py-2 outline-none">
            </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Guest Matrix Tier</label>
                <select name="tier" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 bg-white outline-none focus:ring-2 focus:ring-primary/20">
                    <option>Regular Transient Guest</option>
                    <option>VIP Corporate Member</option>
                    <option>High‑Priority Loyalty Tier</option>
                    <option>Blacklisted Profile</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Housekeeping Instructions</label>
                <input type="text" name="instructions" placeholder="e.g. Extra feather pillows, morning cleaning priority" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 outline-none">
            </div>
        </div>
        <div class="flex justify-end pt-4 border-t border-slate-100">
            <button type="submit" class="bg-slate-800 hover:bg-slate-900 text-white font-medium text-sm px-6 py-2.5 rounded-lg transition shadow-sm">
                <i class="fa-solid fa-user-check mr-2"></i> Commit Profile to Registry
            </button>
        </div>
    </form>
</div>
{% endblock %}
