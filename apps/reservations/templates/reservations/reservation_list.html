{% extends 'base.html' %}
{% block title %}Reservations{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-4">Reservations</h2>
<table class="w-full text-sm text-left bg-white rounded-xl shadow">
    <thead><tr><th class="p-3">Guest</th><th class="p-3">Room</th><th class="p-3">Check-in</th><th class="p-3">Check-out</th><th class="p-3">Status</th></tr></thead>
    <tbody>{% for r in reservations %}<tr class="border-t"><td class="p-3">{{ r.guest }}</td><td class="p-3">{{ r.room }}</td><td class="p-3">{{ r.check_in }}</td><td class="p-3">{{ r.check_out }}</td><td class="p-3">{{ r.get_status_display }}</td></tr>{% endfor %}</tbody>
</table>
{% endblock %}
