<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>{% block title %}Grand Horizon{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#f97316',
                        primaryDark: '#ea580c',
                    }
                }
            }
        }
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <!-- PUBLIC HEADER -->
    <header class="bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <!-- Logo / Brand -->
            <a href="{% url 'home' %}" class="flex items-center space-x-2 text-slate-800 hover:text-primary transition">
                <span class="bg-primary text-white text-sm font-extrabold px-2.5 py-1.5 rounded-lg shadow-lg">GH</span>
                <span class="text-lg font-bold hidden sm:inline">Grand Horizon</span>
            </a>

            <!-- Desktop navigation -->
            <div class="hidden md:flex items-center space-x-3">
                <a href="{% url 'login' %}" class="text-slate-600 hover:text-primary font-medium text-sm transition px-3 py-2 rounded-lg hover:bg-slate-100">
                    Login
                </a>
                <a href="{% url 'register' %}" class="bg-primary hover:bg-primaryDark text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-sm transition">
                    Register
                </a>
            </div>

            <!-- Mobile hamburger -->
            <div class="md:hidden flex items-center">
                <button id="mobileMenuButton" class="text-slate-600 focus:outline-none">
                    <i class="fa-solid fa-bars text-2xl"></i>
                </button>
            </div>
        </div>

        <!-- Mobile menu -->
        <div id="mobileMenu" class="hidden md:hidden bg-white/90 backdrop-blur-md border-t border-slate-200">
            <a href="{% url 'login' %}" class="block px-4 py-3 text-slate-600 hover:bg-slate-50 font-medium">Login</a>
            <a href="{% url 'register' %}" class="block px-4 py-3 text-primary font-semibold hover:bg-slate-50">Register</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-6 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-slate-500">
            &copy; {% now "Y" %} Grand Horizon. All rights reserved.
        </div>
    </footer>

    <!-- Scripts -->
    <script src="{% static 'js/auth.js' %}"></script>

    <!-- Simple script for mobile menu toggle -->
    <script>
        const mobileBtn = document.getElementById('mobileMenuButton');
        const mobileMenu = document.getElementById('mobileMenu');
        if (mobileBtn && mobileMenu) {
            mobileBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
